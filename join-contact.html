        <script>
            document.addEventListener("DOMContentLoaded", function () {
                const tabRequestBtn = document.getElementById("tab_request_btn");
                const tabSetsumeikaiBtn = document.getElementById("tab_setsumeikai_btn");
                const formRequestSection = document.getElementById("form_request_section");
                const formSetsumeikaiSection = document.getElementById("form_setsumeikai_section");

                function activateTab(type) {
                    if (type === "setsumeikai") {
                        tabSetsumeikaiBtn.classList.add("active-tab-setsumeikai");
                        tabSetsumeikaiBtn.setAttribute("aria-selected", "true");
                        tabRequestBtn.classList.remove("active-tab-request");
                        tabRequestBtn.setAttribute("aria-selected", "false");
                        formSetsumeikaiSection.classList.add("active-form");
                        formRequestSection.classList.remove("active-form");
                    } else {
                        tabRequestBtn.classList.add("active-tab-request");
                        tabRequestBtn.setAttribute("aria-selected", "true");
                        tabSetsumeikaiBtn.classList.remove("active-tab-setsumeikai");
                        tabSetsumeikaiBtn.setAttribute("aria-selected", "false");
                        formRequestSection.classList.add("active-form");
                        formSetsumeikaiSection.classList.remove("active-form");
                    }
                }

                if (tabRequestBtn && tabSetsumeikaiBtn) {
                    tabRequestBtn.addEventListener("click", function () {
                        activateTab("request");
                    });
                    tabSetsumeikaiBtn.addEventListener("click", function () {
                        activateTab("setsumeikai");
                    });
                }

                // Check query params on load
                const urlParams = new URLSearchParams(window.location.search);
                const typeParam = urlParams.get("type");
                if (typeParam === "setsumeikai" || typeParam === "request") {
                    activateTab(typeParam);
                } else {
                    activateTab("request");
                }

                // Date input restriction (prevent selecting past dates)
                const today = new Date();
                const tomorrow = new Date(today);
                tomorrow.setDate(tomorrow.getDate() + 1);
                const minDateStr = tomorrow.toISOString().split("T")[0];
                document.querySelectorAll('input[type="date"]').forEach(function (input) {
                    input.setAttribute("min", minDateStr);
                });
            });
        </script>
